<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BharatX — India's #1 Prediction Market. Trade on politics, cricket, economy & more with ₹10,000 paper money.">
    <title>BharatX — Prediction Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" onclick="navigateTo('markets'); return false;">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Bharat<span class="logo-accent">X</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="#" class="nav-link active" data-page="markets" onclick="navigateTo('markets'); return false;">
                    <span class="nav-icon">📊</span> Markets
                </a>
                <a href="#" class="nav-link" data-page="portfolio" onclick="navigateTo('portfolio'); return false;">
                    <span class="nav-icon">💼</span> Portfolio
                </a>
                <a href="#" class="nav-link" data-page="leaderboard" onclick="navigateTo('leaderboard'); return false;">
                    <span class="nav-icon">🏆</span> Leaderboard
                </a>
            </div>
            <div class="nav-right" id="navRight">
                <!-- Filled by JS: wallet + user menu or login button -->
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="toggleMobileMenu()"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-links" id="mobileMenuLinks">
            <!-- Filled by JS -->
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <button class="modal-close" onclick="closeAuthModal()">✕</button>
            <div class="modal-header">
                <h2 id="authModalTitle">Welcome Back</h2>
                <p id="authModalSubtitle">Login to start trading</p>
            </div>
            <div id="authModalBody">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <!-- Trade Modal -->
    <div class="modal-overlay" id="tradeModal">
        <div class="modal trade-modal">
            <button class="modal-close" onclick="closeTradeModal()">✕</button>
            <div id="tradeModalBody">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Pages rendered here by JS -->
    </main>

    <!-- Chatbot -->
    <button class="chat-fab" id="chatFab" onclick="toggleChat()">
        <span class="chat-fab-icon">💬</span>
        <span class="chat-fab-pulse"></span>
    </button>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">🤖</div>
                <div>
                    <h4>Bharat AI</h4>
                    <span class="chat-status">Online</span>
                </div>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Messages rendered here -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Ask about markets, tips, analysis..." onkeydown="if(event.key==='Enter')sendChat()">
            <button class="chat-send" onclick="sendChat()">➤</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/markets.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/trading.js"></script>
    <script src="js/portfolio.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/payments.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
